name: blaster-game
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Blaster Game
        run: |
          echo "<div align='center'>" > blaster.html
          echo "<canvas id='blasterCanvas' width='600' height='400' style='border: 1px solid #6B4BFF; border-radius: 10px; margin-top: 20px;'></canvas>" >> blaster.html
          echo "</div>" >> blaster.html
          echo "<script>" >> blaster.html
          echo "const canvas = document.getElementById('blasterCanvas');" >> blaster.html
          echo "const ctx = canvas.getContext('2d');" >> blaster.html
          echo "let x = canvas.width / 2, y = canvas.height / 2, dx = 2, dy = 2;" >> blaster.html
          echo "function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#6B4BFF'; ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill(); x += dx; y += dy; if (x + 10 > canvas.width || x - 10 < 0) dx = -dx; if (y + 10 > canvas.height || y - 10 < 0) dy = -dy; } setInterval(draw, 30);" >> blaster.html
          echo "</script>" >> blaster.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blaster-game
          path: blaster.html

      - name: Deploy Blaster Game
        run: |
          mkdir -p public
          mv blaster.html public/

      - name: Upload Blaster Game
        uses: actions/upload-artifact@v4
        with:
          name: blaster-public
          path: public/
